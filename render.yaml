# Copy this file to .env and fill in your values.
# NEVER commit .env — only .env.example goes to GitHub.

# PostgreSQL connection string
# Local example:  postgresql://postgres:password@localhost:5432/quantara
# Render example: provided automatically via render.yaml
DATABASE_URL=postgresql://localhost/quantara

# Discord bot token (from Discord Developer Portal)
DISCORD_TOKEN=your_bot_token_here

# Discord webhook URL for #trade-feed channel (optional)
# Create in Discord: Server Settings → Integrations → Webhooks → New Webhook
DISCORD_WEBHOOK_URL=
